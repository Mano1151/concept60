name: Generate E2E and Security Reports

on:
  push:
    branches:
      - '**'

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Start Express Server
        working-directory: server
        run: |
          npm start &

      - name: Start Client App
        working-directory: client
        run: |
          npm run dev &

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for servers to be responsive
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:5173 > /dev/null; do sleep 1; done'
          timeout 60s bash -c 'until curl -s http://localhost:5000 > /dev/null; do sleep 1; done'

      - name: Run E2E tests and generate Excel report
        run: |
          python run_e2e_tests.py

      - name: Run Vulnerability security tests
        run: |
          python run_vulnerability_tests.py

      - name: Upload E2E Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e test/e2e_test_report.xlsx

      - name: Upload Vulnerability Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-test-report
          path: vulnerability test/vulnerability_test_report.xlsx

      - name: Upload Executive Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-executive-summary
          path: vulnerability test/executive_summary.md
