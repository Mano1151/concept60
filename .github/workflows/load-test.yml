name: Load Testing

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration of the test in seconds'
        required: true
        default: '60'
      connections:
        description: 'Number of concurrent connections'
        required: true
        default: '100'

jobs:
  load-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl
        
    - name: Install Server Dependencies
      working-directory: ./server
      run: npm ci
      
    - name: Disable Rate Limiter for Testing
      working-directory: ./server
      run: |
        sed -i 's/app.use(limiter);/\/\/ app.use(limiter);/g' index.js
      
    - name: Start Server
      working-directory: ./server
      run: |
        echo "PORT=5000" > .env
        npm start &
        # Wait for the server to boot
        sleep 5
        
    - name: Run Autocannon Load Test
      run: |
        mkdir -p "Load Test Results"
        npx -y autocannon -c ${{ github.event.inputs.connections || '100' }} -d ${{ github.event.inputs.duration || '60' }} --json http://localhost:5000/api/test > "Load Test Results/autocannon_result.json"
        
    - name: Generate Excel Report
      working-directory: ./Load Test Results
      run: |
        python generate_excel.py
        
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      with:
        name: load-testing-report
        path: "Load Test Results/Load_Testing_Report.xlsx"
